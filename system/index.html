<body>
  <main class="launcher">
    <section id="launcher-loading" class="launcher-card">
      <h1>이세미 캠프 통합 서비스</h1>
      <p class="launcher-muted">로그인 상태를 확인하는 중입니다.</p>
    </section>

    <section id="launcher-error" class="launcher-card hidden">
      <h1>로그인이 필요합니다</h1>
      <p id="launcher-error-message" class="launcher-muted"></p>
      <button id="launcher-login-btn" type="button" class="launcher-primary">Google 계정으로 로그인</button>
    </section>

    <section id="launcher-shell" class="launcher-card hidden">
      <header class="launcher-header">
        <h1>이세미 캠프 통합 서비스</h1>
        <button id="launcher-logout-btn" type="button" class="launcher-ghost">로그아웃</button>
      </header>
      <p class="launcher-muted">원하는 서비스를 선택하세요.</p>
      <div id="service-buttons" class="service-buttons"></div>
    </section>
  </main>
</body>
