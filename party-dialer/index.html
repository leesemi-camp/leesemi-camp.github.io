<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>당원 명부 전화 시스템</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="shortcut icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../service-shell.css">
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-check-compat.js" defer></script>
  <script src="../service-shell.js" type="module"></script>
</head>
<body>
  <main class="service-layout">
    <header class="service-topbar">
      <h1>당원 명부 전화 시스템</h1>
      <div class="service-actions">
        <a href="/system/" class="icon-btn" aria-label="메인으로 이동" title="메인으로">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 11.5 12 4l9 7.5"/>
            <path d="M6 10.5V20h12v-9.5"/>
          </svg>
        </a>
        <button id="service-logout-btn" type="button" class="icon-btn" aria-label="로그아웃" title="로그아웃">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M15 3h-7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h7"/>
            <path d="M10 12h10"/>
            <path d="m17 7 5 5-5 5"/>
          </svg>
        </button>
      </div>
    </header>

    <section class="service-card">
      <h2>서비스 준비 중</h2>
      <p>당원 명부 전화 시스템 페이지의 기본 진입 동선만 먼저 구성해두었습니다. 메인 랜딩으로 언제든 돌아갈 수 있습니다.</p>
      <a class="service-link" href="/system/">메인 랜딩으로 돌아가기</a>
    </section>
  </main>
</body>
</html>
