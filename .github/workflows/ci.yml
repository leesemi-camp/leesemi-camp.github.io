name: CI

on:
  push:
    # branches: ["main"]
    branches-ignore:
      - "gh-pages"
      - "docs/**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: 'npm'

      - name: "Generate runtime config override (required for CI)"
        env:
          APP_CONFIG_LOCAL_JS: ${{ secrets.APP_CONFIG_LOCAL_JS }}
        run: |
          if [ -z "$APP_CONFIG_LOCAL_JS" ]; then
            echo "ERROR: APP_CONFIG_LOCAL_JS secret is required in CI environment"
            exit 1
          fi
          printf '%s\n' "$APP_CONFIG_LOCAL_JS" > config.local.js
          echo "config.local.js generated successfully"

      - name: "Install Dependencies, Playwright Browsers"
        run: |
          npm install
          npx playwright install --with-deps

      - name: "Run Playwright Tests"
        run: npm test
