name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate runtime config override
        env:
          APP_CONFIG_LOCAL_JS: ${{ secrets.APP_CONFIG_LOCAL_JS }}
        run: |
          if [ -z "$APP_CONFIG_LOCAL_JS" ]; then
            echo "ERROR: GitHub Secret APP_CONFIG_LOCAL_JS is required."
            exit 1
          fi
          printf '%s\n' "$APP_CONFIG_LOCAL_JS" > config.local.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
