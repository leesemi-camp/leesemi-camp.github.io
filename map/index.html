    <meta name="twitter:image" content="https://leesemi-camp.github.io/assets/landing/main-image.png">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="shortcut icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v10.8.0/ol.css">
    <link rel="stylesheet" href="../styles.css">

<body data-map-mode="view">
<main class="layout">
    <section id="app-shell" class="app-shell" aria-live="polite">
        <header class="topbar">
            <div class="topbar-texts">
                <div class="topbar-title-row">
                    <h2 class="topbar-title">우리동네 현안도, 이세미입니다</h2>
                    <span id="total-issue-count" class="topbar-total-issue-count">총 현안 건수: 0건</span>
                </div>
            </div>
            <div class="topbar-actions">
                <a href="../" class="icon-btn" aria-label="메인 랜딩으로 이동" title="메인으로">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M3 11.5 12 4l9 7.5"/>
                        <path d="M6 10.5V20h12v-9.5"/>
                    </svg>
                </a>
                <a href="/map/edit/" class="icon-btn" aria-label="현안 수정으로 이동" title="현안 수정">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M3 17.25V21h3.75L19.81 7.94l-3.75-3.75L3 17.25z"/>
                        <path d="m14.06 4.19 3.75 3.75"/>
                    </svg>
                </a>
            </div>
        </header>

        <section class="workspace">
            <div class="map-wrap map-wrap-initializing">
                <div id="map" class="map" role="application" aria-label="동별 현안 지도"></div>
                <div id="map-popup" class="map-popup hidden" aria-hidden="true"></div>
            </div>

            <aside class="side-panel">
                <section id="issue-stats-summary" class="issue-stats-summary" aria-live="polite"></section>
                <section class="pledge-panel">
                    <h3>지역구 공통 현안</h3>
                    <ul id="common-pledge-list" class="pledge-list"></ul>
                </section>

                <h3 class="list-title">우리동네 현안</h3>
                <div class="spot-filter-row">
                    <button id="issue-view-dong-btn" type="button" class="btn-secondary btn-small spot-action-btn spot-action-btn-checked">동별 보기
                    </button>
                    <button id="clear-dong-filter-btn" type="button" class="btn-secondary btn-small hidden">전체 보기
                    </button>
                </div>
                <p class="muted">지도에서 동 영역을 클릭하면 해당 동 현안만 볼 수 있습니다.</p>
                <ul id="spot-list" class="spot-list"></ul>
            </aside>
        </section>
        <section class="issue-helper" aria-label="현안 제보 안내">
            <div id="issue-helper-bubble" class="issue-helper-bubble">
                <button id="issue-helper-close-btn" type="button" class="issue-helper-close-btn" aria-label="현안 안내 말풍선 닫기">×</button>
                <p class="issue-helper-quote">동네 이야기를 들려주세요 ☺</p>
                <div class="issue-helper-contact-dock" aria-label="현안 제보 연락처">
                    <a href="sms:01081901440" class="issue-helper-contact-link issue-helper-contact-link-row" aria-label="현안 추가 문의 문자 보내기">
                        <span class="issue-helper-contact-icon" aria-hidden="true">📱</span>
                        <span>010-8190-1440</span>
                    </a>
                    <a href="mailto:leesemi114@gmail.com" class="issue-helper-contact-link issue-helper-contact-link-row" aria-label="현안 추가 문의 이메일 보내기">
                        <span class="issue-helper-contact-icon" aria-hidden="true">✉️</span>
                        <span>leesemi114@gmail.com</span>
                    </a>
                </div>
            </div>
            <button
                id="issue-helper-toggle"
                class="issue-helper-toggle"
                type="button"
                aria-controls="issue-helper-bubble"
                aria-expanded="true"
                aria-label="현안 안내 메시지 열기 또는 닫기"
            >
                <img
                    class="issue-helper-character"
                    src="/assets/character/%EC%82%BC%EC%B4%9D%EC%82%AC%28%EC%98%86%292.png"
                    alt="현안 제보를 안내하는 캐릭터"
                    width="160"
                    height="210"
                    loading="lazy"
                    decoding="async"
                >
            </button>
        </section>
    </section>
</main>
</body>
</html>
